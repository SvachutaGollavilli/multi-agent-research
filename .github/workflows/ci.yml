# .github/workflows/ci.yml
# ─────────────────────────────────────────────────────────────────
# CI Pipeline — Multi-Agent Research Assistant
# ─────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Top-level permissions — least privilege
permissions:
  contents: read

env:
  ANTHROPIC_API_KEY: "test-ant-not-real"
  TAVILY_API_KEY:    "test-tvly-not-real"
  PYTHONUNBUFFERED:  "1"

# ─────────────────────────────────────────────────────────────────
# Job 1 — Lint
# ─────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: "Lint (ruff)"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies (with dev group)
        run: uv sync --all-groups

      - name: Ruff — lint
        run: uv run ruff check src/ tests/ app.py --output-format=github

      - name: Ruff — format check
        run: uv run ruff format src/ tests/ app.py --check


# ─────────────────────────────────────────────────────────────────
# Job 2 — Tests
# ─────────────────────────────────────────────────────────────────
  test:
    name: "Tests (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15

    # dorny/test-reporter needs checks:write to post annotations
    permissions:
      contents: read
      checks:   write

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run test suite
        run: |
          uv run pytest tests/ \
            -v \
            --tb=short \
            --junitxml=test-results-${{ matrix.python-version }}.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results-${{ matrix.python-version }}.xml
          retention-days: 14

      - name: Report test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name:          "Tests — Python ${{ matrix.python-version }}"
          path:          "test-results-${{ matrix.python-version }}.xml"
          reporter:      java-junit
          fail-on-error: true


# ─────────────────────────────────────────────────────────────────
# Job 3 — Coverage
# ─────────────────────────────────────────────────────────────────
  coverage:
    name: "Coverage"
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    # orgoro/coverage needs pull-requests:write to post PR comments
    permissions:
      contents:      read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=65 \
            -q

      - name: Upload coverage report (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 14

      - name: Post coverage summary to PR
        if: github.event_name == 'pull_request'
        uses: orgoro/coverage@v3.2
        with:
          coverageFile: coverage.xml
          token:        ${{ secrets.GITHUB_TOKEN }}
          thresholdAll: 0.65
          thresholdNew: 0.65
          thresholdModified: 0.60
