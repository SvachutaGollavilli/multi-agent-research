# .github/workflows/ci.yml
# ─────────────────────────────────────────────────────────────────
# CI Pipeline — Multi-Agent Research Assistant
#
# Jobs (run in order, each depends on the previous passing):
#   1. lint     — ruff check + ruff format (fast, ~15s)
#   2. test     — full pytest suite, no real API calls (~2min)
#   3. coverage — re-runs tests with coverage, posts report to PR
#
# Triggers:
#   push        → every branch
#   pull_request → targeting main or develop
#
# Streamlit Cloud CD:
#   Streamlit Cloud watches the `main` branch via GitHub webhook.
#   When this CI pipeline passes on main, Streamlit auto-deploys.
#   No separate deploy job is needed — branch protection rules
#   ensure Streamlit only gets code that passed CI.
#
# Badge for README:
#   [![CI](https://github.com/YOUR_USERNAME/multi-agent-research/actions/workflows/ci.yml/badge.svg)](https://github.com/YOUR_USERNAME/multi-agent-research/actions/workflows/ci.yml)
# ─────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs on the same branch when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Fake keys so any import that reads os.environ doesn't crash.
  # No real API calls are made — all LLM/search are mocked in tests.
  ANTHROPIC_API_KEY: "test-ant-not-real"
  TAVILY_API_KEY:    "test-tvly-not-real"
  PYTHONUNBUFFERED:  "1"

# ─────────────────────────────────────────────────────────────────
# Job 1 — Lint
# Runs ruff (linter + formatter check). Fast gate before full tests.
# ─────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: "Lint (ruff)"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies (with dev group)
        run: uv sync --all-groups

      - name: Ruff — lint
        run: uv run ruff check src/ tests/ app.py --output-format=github

      - name: Ruff — format check
        run: uv run ruff format src/ tests/ app.py --check


# ─────────────────────────────────────────────────────────────────
# Job 2 — Tests
# Full pytest suite across Python 3.11 and 3.12.
# Uploads JUnit XML so GitHub shows per-test pass/fail inline.
# ─────────────────────────────────────────────────────────────────
  test:
    name: "Tests (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    needs: lint               # only run if lint passes
    timeout-minutes: 15

    strategy:
      fail-fast: false        # show all failures, not just first
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run test suite
        run: |
          uv run pytest tests/ \
            -v \
            --tb=short \
            --junitxml=test-results-${{ matrix.python-version }}.xml

      - name: Upload test results
        if: always()          # upload even on failure so failures are visible
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results-${{ matrix.python-version }}.xml
          retention-days: 14

      # Publish test results as PR check annotations
      - name: Report test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name:     "Tests — Python ${{ matrix.python-version }}"
          path:     "test-results-${{ matrix.python-version }}.xml"
          reporter: java-junit
          fail-on-error: true


# ─────────────────────────────────────────────────────────────────
# Job 3 — Coverage
# Re-runs tests with coverage on Python 3.11 only (canonical version).
# Posts coverage summary as a PR comment and fails if < 70%.
# ─────────────────────────────────────────────────────────────────
  coverage:
    name: "Coverage"
    runs-on: ubuntu-latest
    needs: test               # only run after tests pass
    timeout-minutes: 15
    # Only post coverage comments on PRs (not on every branch push)
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=70 \
            -q

      - name: Upload coverage report (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 14

      - name: Post coverage summary to PR
        if: github.event_name == 'pull_request'
        uses: orgoro/coverage@v3.2
        with:
          coverageFile: coverage.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          thresholdAll: 0.70
          thresholdNew: 0.70
          thresholdModified: 0.60
