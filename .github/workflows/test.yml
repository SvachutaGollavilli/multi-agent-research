# .github/workflows/test.yml
# ─────────────────────────────────────────────────────────────────
# CI: Run the full test suite on every push and pull request.
#
# All 110+ tests run WITHOUT real API keys — LLM calls are mocked.
# The badge in README.md turns green when this workflow passes.
#
# Triggers:
#   push        → runs on every commit to any branch
#   pull_request → runs on every PR targeting main
#
# To see the badge:
#   [![Tests](https://github.com/YOUR_USERNAME/multi-agent-research/actions/workflows/test.yml/badge.svg)](https://github.com/YOUR_USERNAME/multi-agent-research/actions/workflows/test.yml)
# ─────────────────────────────────────────────────────────────────

name: Tests

on:
  push:
    branches: ["**"]          # run on every branch push
  pull_request:
    branches: [main]          # run on PRs targeting main

jobs:
  test:
    name: "Python ${{ matrix.python-version }} | ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false         # show all failures, not just the first
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12"]

    steps:
      # ── Checkout ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Set up uv (fast Python package manager) ────────────────
      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true   # caches the uv package cache between runs

      # ── Set up Python via uv ───────────────────────────────────
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      # ── Install all dependencies (including dev group) ─────────
      - name: Install dependencies
        run: uv sync --all-groups

      # ── Run full test suite ────────────────────────────────────
      # No API keys are needed — all LLM and search calls are mocked.
      # Fake keys are set so imports don't fail on missing env vars.
      - name: Run tests
        env:
          ANTHROPIC_API_KEY: "test-key-not-real"
          TAVILY_API_KEY:    "test-tavily-not-real"
        run: uv run pytest tests/ -v --tb=short

      # ── Upload test results as artifact (optional) ─────────────
      # Useful for inspecting failures in the GitHub Actions UI.
      - name: Upload pytest results
        if: always()           # upload even on failure
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-${{ matrix.python-version }}
          path: .pytest_cache/
          retention-days: 7
