# configs/base.yaml
# ─────────────────────────────────────────────
# Single source of truth for all pipeline settings.
# Change behavior here — never hardcode values in Python files.
# ─────────────────────────────────────────────

# ── LLM Models ────────────────────────────────
models:
  planner:     "claude-haiku-4-5-20251001"
  researcher:  "claude-haiku-4-5-20251001"
  analyst:     "claude-haiku-4-5-20251001"
  synthesizer: "claude-haiku-4-5-20251001"
  writer:      "claude-haiku-4-5-20251001"
  reviewer:    "claude-haiku-4-5-20251001"
  default:     "claude-haiku-4-5-20251001"

# ── Token limits per agent ─────────────────────
max_tokens:
  planner:     256
  researcher:  256
  analyst:     768
  synthesizer: 1024
  writer:      1500
  reviewer:    512
  default:     512

# ── Budget (USD) ───────────────────────────────
budget:
  soft_limit:  0.08
  hard_limit:  0.10

# ── Search settings ────────────────────────────
search:
  max_results:      5
  search_depth:     "basic"
  max_wiki_results: 3

# ── Pipeline behaviour ─────────────────────────
pipeline:
  max_sub_topics:    3
  max_revisions:     2
  quality_threshold: 0.4   # minimum composite score to pass quality gate (0.0–1.0)
  review_pass_score: 7     # minimum reviewer score to accept report (1–10)
  max_quality_retries: 1   # how many times quality gate can send back to researcher

# ── Quality gate ───────────────────────────────
# Pure-Python heuristic scorer — no LLM, no cost, runs in <1ms.
# Composite score = (domain_trust × domain_weight) + (snippet_quality × snippet_weight)
quality_gate:
  domain_weight:   0.5   # weight of domain trust in composite score
  snippet_weight:  0.5   # weight of snippet quality in composite score

  # Minimum snippet length thresholds
  snippet_min_chars:  100   # below this → snippet quality = 0.0
  snippet_max_chars:  300   # at or above this → snippet quality = 1.0
                             # linear interpolation between min and max

  # Boilerplate penalty — deducted from snippet quality score if found
  boilerplate_penalty: 0.3

  # Domain trust scores (0.0–1.0) by tier
  # Domains not in any list receive the neutral score
  domain_trust_high:    1.0   # wikipedia, arxiv, nature, gov, edu domains
  domain_trust_medium:  0.6   # medium, github, towardsdatascience, etc.
  domain_trust_low:     0.2   # reddit, quora, yahoo answers, etc.
  domain_trust_neutral: 0.4   # unknown / unlisted domains

  # Domains by tier (extend these lists freely — no code changes needed)
  high_trust_domains:
    - "wikipedia.org"
    - "arxiv.org"
    - "nature.com"
    - "science.org"
    - "pubmed.ncbi.nlm.nih.gov"
    - "scholar.google.com"
    - "britannica.com"
    - "mit.edu"
    - "stanford.edu"
    - "harvard.edu"
    - "ieee.org"
    - "acm.org"
    - "bbc.com"
    - "reuters.com"
    - "apnews.com"

  medium_trust_domains:
    - "medium.com"
    - "towardsdatascience.com"
    - "github.com"
    - "stackoverflow.com"
    - "techcrunch.com"
    - "wired.com"
    - "theverge.com"
    - "zdnet.com"
    - "venturebeat.com"
    - "analyticsvidhya.com"
    - "kdnuggets.com"
    - "neptune.ai"

  low_trust_domains:
    - "reddit.com"
    - "quora.com"
    - "yahoo.com"
    - "answers.com"

  # Boilerplate phrases — if any appear in a snippet, apply penalty
  boilerplate_phrases:
    - "click here"
    - "subscribe now"
    - "sign up"
    - "log in to"
    - "cookie policy"
    - "privacy policy"
    - "all rights reserved"
    - "terms of service"
    - "javascript is disabled"
    - "enable javascript"
    - "advertisement"

# ── Cache ──────────────────────────────────────
cache:
  ttl_seconds:          86400
  enabled:              true
  similarity_threshold: 0.85  # cosine similarity cutoff for semantic cache hits
                               # 1.0 = exact match only
                               # 0.85 = catches paraphrases ("what is X" / "explain X")
                               # 0.70 = aggressive — risks false positives
                               # <0.70 = different topic, always a true miss

# ── Rate limiting ──────────────────────────────
rate_limiter:
  requests_per_minute: 50

# ── Logging ────────────────────────────────────
logging:
  level: "INFO"
  queue_max_size: 1000
