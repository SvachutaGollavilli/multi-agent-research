# configs/base.yaml
# ─────────────────────────────────────────────
# Single source of truth for all pipeline settings.
# Change behavior here — never hardcode values in Python files.
# ─────────────────────────────────────────────

# ── LLM Models ────────────────────────────────
models:
  planner:     "claude-haiku-4-5-20251001"
  researcher:  "claude-haiku-4-5-20251001"
  analyst:     "claude-haiku-4-5-20251001"
  synthesizer: "claude-haiku-4-5-20251001"
  writer:      "claude-haiku-4-5-20251001"
  reviewer:    "claude-haiku-4-5-20251001"
  default:     "claude-haiku-4-5-20251001"

# ── Token limits per agent ─────────────────────
# Tighter ceilings = faster responses.
# Rule: set to ~1.5x the typical output, not the maximum possible.
# Actual outputs observed: planner~100, analyst~800, writer~900 tokens.
max_tokens:
  planner:     256    # structured output: sub_topics + plan — never long
  researcher:  256    # no LLM call currently; placeholder for future query refinement
  analyst:     768    # claims JSON — 6-8 claims, each ~80 tokens = ~640 tokens
  synthesizer: 1024
  writer:      1500   # markdown report ~900 tokens observed; 1500 is safe headroom
  reviewer:    512
  default:     512

# ── Budget (USD) ───────────────────────────────
budget:
  soft_limit:  0.08
  hard_limit:  0.10

# ── Search settings ────────────────────────────
search:
  max_results:      5
  search_depth:     "basic"
  max_wiki_results: 3

# ── Pipeline behaviour ─────────────────────────
pipeline:
  max_sub_topics:    3
  max_revisions:     2
  quality_threshold: 0.4
  review_pass_score: 7

# ── Cache ──────────────────────────────────────
cache:
  ttl_seconds: 86400
  enabled:     true

# ── Rate limiting ──────────────────────────────
rate_limiter:
  requests_per_minute: 50

# ── Logging ────────────────────────────────────
logging:
  level: "INFO"
  queue_max_size: 1000
