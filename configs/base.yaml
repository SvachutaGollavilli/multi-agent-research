# configs/base.yaml
# ─────────────────────────────────────────────
# Single source of truth for all pipeline settings.
# Change behavior here — never hardcode values in Python files.
# ─────────────────────────────────────────────

# ── LLM Models ────────────────────────────────
# Assign different models to different agents.
# Cheap/fast for high-volume agents, smarter for quality-critical ones.
models:
  planner:     "claude-haiku-4-5-20251001"   # fast — just decomposing a query
  researcher:  "claude-haiku-4-5-20251001"   # fast — just refining search queries
  analyst:     "claude-haiku-4-5-20251001"   # medium complexity
  synthesizer: "claude-haiku-4-5-20251001"   # medium complexity
  writer:      "claude-haiku-4-5-20251001"   # upgrade to sonnet when budget allows
  reviewer:    "claude-haiku-4-5-20251001"   # upgrade to sonnet for stricter review
  default:     "claude-haiku-4-5-20251001"   # fallback for any unlisted agent

# ── Token limits per agent ─────────────────────
# Prevents runaway LLM calls. Lower = faster + cheaper.
max_tokens:
  planner:     512
  researcher:  512
  analyst:     2048
  synthesizer: 2048
  writer:      4096
  reviewer:    1024
  default:     1024

# ── Budget (USD) ───────────────────────────────
budget:
  soft_limit:  0.08     # warn at $0.08 — pipeline continues
  hard_limit:  0.10     # stop at $0.10 — skip LLM, return fallback

# ── Search settings ────────────────────────────
search:
  max_results:      5   # Tavily results per query
  search_depth:     "basic"   # "basic" or "advanced" (advanced costs 2x)
  max_wiki_results: 3   # Wikipedia results per query

# ── Pipeline behaviour ─────────────────────────
pipeline:
  max_sub_topics:    3   # planner decomposes into at most N sub-topics
  max_revisions:     2   # reviewer can send back to writer at most N times
  quality_threshold: 0.4 # quality gate: min score to proceed (0.0–1.0)
  review_pass_score: 7   # reviewer: min score out of 10 to accept report

# ── Cache ──────────────────────────────────────
cache:
  ttl_seconds: 86400    # 24 hours — how long to keep cached search results
  enabled:     true     # set to false to force fresh searches every time

# ── Rate limiting ──────────────────────────────
# Anthropic free tier: 50 req/min on Haiku
rate_limiter:
  requests_per_minute: 50

# ── Logging ────────────────────────────────────
logging:
  level: "INFO"         # DEBUG / INFO / WARNING / ERROR
  queue_max_size: 1000  # drop events if queue exceeds this (protects agents)