# configs/base.yaml
# ─────────────────────────────────────────────
# Single source of truth for all pipeline settings.
# Change behavior here — never hardcode values in Python files.
# ─────────────────────────────────────────────

# ── LLM Models ────────────────────────────────
models:
  planner:     "claude-haiku-4-5-20251001"
  researcher:  "claude-haiku-4-5-20251001"
  analyst:     "claude-haiku-4-5-20251001"
  synthesizer: "claude-haiku-4-5-20251001"
  writer:      "claude-haiku-4-5-20251001"
  reviewer:    "claude-haiku-4-5-20251001"
  default:     "claude-haiku-4-5-20251001"

# ── Token limits per agent ─────────────────────
max_tokens:
  planner:     256
  researcher:  256
  analyst:     768
  synthesizer: 1024
  writer:      1500
  reviewer:    512
  default:     512

# ── Budget (USD) ───────────────────────────────
budget:
  soft_limit:  0.08
  hard_limit:  0.10

# ── Search settings ────────────────────────────
search:
  max_results:      5
  search_depth:     "basic"
  max_wiki_results: 3

# ── Pipeline behaviour ─────────────────────────
pipeline:
  max_sub_topics:    3
  max_revisions:     2
  quality_threshold: 0.4
  review_pass_score: 7

# ── Cache ──────────────────────────────────────
cache:
  ttl_seconds:          86400
  enabled:              true
  similarity_threshold: 0.85  # cosine similarity cutoff for semantic cache hits
                               # 1.0 = exact match only
                               # 0.85 = catches paraphrases ("what is X" / "explain X")
                               # 0.70 = aggressive — risks false positives
                               # <0.70 = different topic, always a true miss

# ── Rate limiting ──────────────────────────────
rate_limiter:
  requests_per_minute: 50

# ── Logging ────────────────────────────────────
logging:
  level: "INFO"
  queue_max_size: 1000
