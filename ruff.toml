# ruff.toml
target-version = "py311"
include = ["src/**/*.py", "tests/**/*.py", "app.py", "main.py"]

[lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM"]

ignore = [
    "E501",   # line too long — formatter handles this
    "E402",   # module-level import not at top — intentional in app.py (_inject_secrets must run first)
    "B008",   # function call in default arg — used in LangGraph patterns
    "SIM108", # ternary — readability preference
    "UP007",  # X | Y unions — keep Optional for 3.10 compat
    "UP045",  # Optional[X] -> X | None — same reason as UP007
    "B905",   # zip() strict= — verbose, not needed here
    "SIM117", # nested with — sometimes clearer than combined
]

[lint.per-file-ignores]
"tests/*" = [
    "S101",  # assert is fine in tests
    "F841",  # unused local vars in fixtures
    "B017",  # pytest.raises(Exception) — acceptable in broad smoke tests
]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
